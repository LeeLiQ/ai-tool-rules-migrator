# ai-rules configuration
# Copy this file to config.yaml and adjust to match your setup.
#   cp config.example.yaml config.yaml

workspace: /path/to/your/workspace
canonical_store: ./universal-rules

tools:
  claude-code:
    rule_patterns: ["CLAUDE.md"]
    # global_path: "C:\\Users\\you\\.claude"  # uncomment if you have global Claude Code rules
  cursor:
    rule_patterns: [".cursor/rules/*.mdc"]
    global_path: "~/.cursor/rules"  # global Cursor rules (applies to all projects)
  copilot:
    rule_patterns: [".github/copilot-instructions.md"]

repos:
  - path: my-backend-repo
    tools: [claude-code, cursor, copilot]
  - path: my-database-repo
    tools: [claude-code, cursor, copilot]
